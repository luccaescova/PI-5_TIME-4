<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leiturar – Menu</title>

<style>
   body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #1E1E1E;
        display: flex;
        justify-content: center;
    }

    .container {
        background-color: #C9FF8F;
        width: 1000px;
        min-height: 100vh;
        border-radius: 10px;
        overflow: hidden;
        position: relative;
    }

    /* ------ TOPO ------ */
    header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 25px 35px;
        background-color: #C9FF8F;
        position: relative;
    }

    .left-area {
        display: flex;
        align-items: center;
        gap: 25px;
    }

    .menu-icon {
        width: 35px;
        height: 10px;
        background-color: black;
        position: relative;
        cursor: pointer;
    }

    .menu-icon::before,
    .menu-icon::after {
        content: "";
        width: 35px;
        height: 10px;
        background-color: black;
        position: absolute;
        left: 0;
    }

    .menu-icon::before { top: -8px; }
    .menu-icon::after { top: 8px; }

    .logo {
        font-size: 28px;
        font-weight: bold;
        color: black;
    }

    /* ------ PESQUISA ------ */
    .search-area {
        display: flex;
        align-items: center;
    }

    .search-input {
        padding: 8px 12px;
        border-radius: 20px;
        border: 1px solid #333;
        width: 260px;
        font-size: 14px;
    }

    /* ------ ÁREA DO MENU ------ */
    .content {
        background-color: white;
        margin: 30px auto;
        width: 90%;
        padding: 20px;
        border-radius: 5px;
        min-height: 400px;
        border: 1px solid #000;
    }

    .section-title {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 20px;
        color: #333;
    }

    .books-grid {
        display: flex;
        justify-content: center;   /* centraliza */
        align-items: flex-start;    /* alinha no topo */
        gap: 40px;                  /* espaço entre os cards */
        flex-wrap: nowrap;          /* impede quebrar linha */
    }

    .books-row {
        display: flex;
        justify-content: space-between;
        gap: 20px;
    }

    .book {
        width: 30%;
        background-color: #C9FF8F;
        border: 2px solid #7cd957;
        border-radius: 10px;
        padding: 15px;
        text-align: center;
        cursor: pointer;
        transition: 0.15s;
    }

    .book:hover {
        transform: scale(1.05);
    }

    .book img {
        width: 100%;
        height: 230px;
        object-fit: cover;
        border-radius: 8px;
        border: 1px solid #000;
    }

    .book-title {
        margin-top: 10px;
        font-weight: bold;
        font-size: 16px;
        color: #000;
    }

    /* ------ POPUP ------ */
    .popup-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.6);
        display: none;
        justify-content: center;
        align-items: center;
    }

    .btn-fav {
        background-color: #8ec5ff;
    }
    .btn-fav:hover {
        background-color: #6bb4ff;
    }

    .popup {
        background: #C9FF8F;
        padding: 25px;
        width: 330px;
        border-radius: 10px;
        border: 2px solid black;
        text-align: center;
    }

    .popup h2 {
        margin: 0 0 20px 0;
        font-size: 22px;
        font-weight: bold;
    }

    .popup button {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        margin-top: 10px;
        border-radius: 6px;
        border: 2px solid black;
        cursor: pointer;
        font-weight: bold;
    }

    .btn-ler { background-color: #7CD957; }
    .btn-questoes { background-color: #FFF275; }
    .btn-close { background-color: #ff6961; }

    /* ------ DROPDOWN MENU ------ */
    .dropdown-menu {
        position: absolute;
        top: 75px;
        left: 35px;
        background-color: #C9FF8F;
        border: 2px solid black;
        border-radius: 8px;
        display: none;
        flex-direction: column;
        width: 180px;
        z-index: 1000;
    }

    .dropdown-menu button {
        padding: 12px;
        background: #C9FF8F;
        border: none;
        border-bottom: 2px solid black;
        cursor: pointer;
        font-weight: bold;
        text-align: left;
    }

    .dropdown-menu button:hover {
        background-color: #b7f07d;
    }

    .dropdown-menu button:last-child {
        border-bottom: none;
    }
</style>
</head>

<body>

<div class="container">

    <!-- TOPO -->
    <header>
        <div class="left-area">
            <div class="menu-icon" onclick="toggleDropdown()"></div>
            <div class="logo">Leiturar</div>
        </div>

        <div class="search-area">
            <input class="search-input" type="search" placeholder="Pesquisar...">
        </div>

        <!-- DROPDOWN -->
        <div id="dropdownMenu" class="dropdown-menu">
            <button onclick="window.location.href='Favoritos.html'">Favoritos</button>
            <button onclick="window.location.href='ajuda.html'">Dúvidas</button>
            <button onclick="handleLogout()">Logout</button>
        </div>
    </header>

    <!-- CONTEÚDO -->
    <div class="content">
        <div class="section-title">Livros</div>
        <div class="books-grid" id="books-grid">
            <p>Carregando livros...</p>
        </div>
    </div>

</div>

<!-- POPUP -->
<div class="popup-bg" id="popupBg">
    <div class="popup">
        <h2 id="popupTitle">Título do Livro</h2>
        <button id="btnLer" class="btn-ler">Ler livro</button>
        <button id="btnFavoritar" class="btn-fav">Adicionar aos favoritos</button>
        <button id="btnQuestoes" class="btn-questoes">Resolver questões</button>
        <button onclick="closePopup()" class="btn-close">Fechar</button>
    </div>
</div>

<script>

    const API_URL = 'http://localhost:4000';
    const booksGrid = document.getElementById('books-grid');
    let allBooks = [];

    function handleLogout() {
        localStorage.removeItem('leiturar_token');
        localStorage.removeItem('leiturar_user');
        window.location.href = 'Login.html';
    }

    /* ===== CARREGAR LIVROS ===== */
    async function loadBooks() {
        const token = localStorage.getItem('leiturar_token');
        
        if (!token) {
            window.location.href = 'Login.html';
            return;
        }

        try {
            const res = await fetch(`${API_URL}/books`, {
                headers: { "Authorization": `Bearer ${token}` }
            });

            const books = await res.json();

            if (res.ok) {
                allBooks = books;            // SALVA LIVROS
                renderBooks(allBooks);       // RENDERIZA TUDO
            } else {
                booksGrid.innerHTML = "<p>Erro ao carregar livros.</p>";
            }

        } catch (err) {
            console.error(err);
            booksGrid.innerHTML = "<p>Erro de conexão com o servidor.</p>";
        }
    }

    /* ===== RENDERIZAR LIVROS ===== */
    function renderBooks(books) {
        booksGrid.innerHTML = "";

        if (books.length === 0) {
            booksGrid.innerHTML = "<p>Nenhum livro encontrado.</p>";
            return;
        }

        const favs = JSON.parse(localStorage.getItem("favoritos") || "[]");

        books.forEach(book => {
            const imageUrl = `img/${book._id}.jpg`;

            booksGrid.innerHTML += `
                <div class="book" onclick="openBookPopup('${book._id}', '${book.titulo}')">
                    <img src="${imageUrl}" alt="Capa" 
                        onerror="this.src='https://placehold.co/230x300/cccccc/000?text=Capa+Indisponível'">
                    <div class="book-title">${book.titulo} ${favs.includes(book._id) ? "⭐" : ""}</div>
                </div>
            `;
        });
    }

    /* ===== POPUP DO LIVRO ===== */
    function openBookPopup(id, title) {
        document.getElementById("popupTitle").innerText = title;
        document.getElementById("popupBg").style.display = "flex";

        document.getElementById("btnLer").onclick = () => {
            window.location.href = `pdfs/${id}.pdf`;
        };

        document.getElementById("btnQuestoes").onclick = () => {
            window.location.href = `Question.html?livro=${id}`;
        };

        const favBtn = document.getElementById("btnFavoritar");
        let favs = JSON.parse(localStorage.getItem("favoritos") || "[]");

        if (favs.includes(id)) {
            favBtn.innerText = "Remover dos favoritos";
            favBtn.onclick = () => removeFavorite(id);
        } else {
            favBtn.innerText = "Adicionar aos favoritos";
            favBtn.onclick = () => addFavorite(id);
        }
    }

    function closePopup() {
        document.getElementById("popupBg").style.display = "none";
    }

    /* ===== FAVORITOS ===== */
    function addFavorite(id) {
        let favs = JSON.parse(localStorage.getItem("favoritos") || "[]");
        if (!favs.includes(id)) {
            favs.push(id);
            localStorage.setItem("favoritos", JSON.stringify(favs));
        }
        closePopup();
        renderBooks(allBooks);
    }

    function removeFavorite(id) {
        let favs = JSON.parse(localStorage.getItem("favoritos") || "[]");
        favs = favs.filter(f => f !== id);
        localStorage.setItem("favoritos", JSON.stringify(favs));
        closePopup();
        renderBooks(allBooks);
    }

    /* ===== PESQUISA ===== */
    const searchInput = document.querySelector(".search-input");

    searchInput.addEventListener("input", function () {
        const q = this.value.toLowerCase();
        const filtered = allBooks.filter(book =>
            book.titulo.toLowerCase().includes(q)
        );
        renderBooks(filtered);
    });

    /* ===== DROPDOWN ===== */
    function toggleDropdown() {
        const menu = document.getElementById("dropdownMenu");
        menu.style.display = menu.style.display === "flex" ? "none" : "flex";
    }

    window.addEventListener("click", function(e) {
        const menu = document.getElementById("dropdownMenu");
        const icon = document.querySelector(".menu-icon");
        if (!menu.contains(e.target) && !icon.contains(e.target)) {
            menu.style.display = "none";
        }
    });

    /* ===== INICIAR ===== */
    window.onload = loadBooks;

</script>

</body>
</html>
